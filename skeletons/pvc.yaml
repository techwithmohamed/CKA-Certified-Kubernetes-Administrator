apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: my-pvc
  # PVC is namespace-scoped — must be in the same namespace as the pod using it
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi             # Must be <= PV capacity to bind
  storageClassName: manual     # Must match PV storageClassName EXACTLY
