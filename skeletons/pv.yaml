apiVersion: v1
kind: PersistentVolume
metadata:
  name: my-pv
  # PV is cluster-scoped — no namespace here
spec:
  capacity:
    storage: 1Gi
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain   # Retain keeps data after PVC delete. Delete removes it.
  storageClassName: manual                 # Must match PVC storageClassName EXACTLY or it won't bind
  hostPath:
    path: /data/my-pv
