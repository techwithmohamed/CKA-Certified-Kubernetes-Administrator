apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: my-netpol
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: my-app
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    # WARNING: these two selectors in the SAME from block = AND (must match both)
    # If you want OR, put them in separate from blocks
    - namespaceSelector:
        matchLabels:
          name: trusted
    - podSelector:
        matchLabels:
          role: frontend
    ports:
    - protocol: TCP
      port: 80
  egress:
  - to:
    - podSelector:
        matchLabels:
          role: db
    ports:
    - protocol: TCP
      port: 5432
  # NEVER forget DNS egress — without this, service name resolution breaks silently
  - to: []
    ports:
    - protocol: UDP
      port: 53
