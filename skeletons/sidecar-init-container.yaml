apiVersion: v1
kind: Pod
metadata:
  name: NAME
  namespace: default
spec:
  initContainers:
  - name: sidecar
    image: busybox:1.36
    restartPolicy: Always     # THIS is what makes it a native sidecar — remove it and it's just a normal init container
    command: ["sh", "-c", "while true; do echo sidecar running; sleep 10; done"]
    volumeMounts:
    - name: shared
      mountPath: /shared
  containers:
  - name: main
    image: nginx:1.27
    ports:
    - containerPort: 80
    volumeMounts:
    - name: shared
      mountPath: /shared
  volumes:
  - name: shared
    emptyDir: {}
