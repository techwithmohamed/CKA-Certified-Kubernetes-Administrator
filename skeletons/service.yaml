apiVersion: v1
kind: Service
metadata:
  name: my-service
spec:
  type: ClusterIP
  selector:
    app: my-deployment
  ports:
  - port: 80           # port: what other pods use to reach this service
    targetPort: 80     # targetPort: actual port the container listens on — get this wrong and traffic goes nowhere
    protocol: TCP
---
# NodePort variant
apiVersion: v1
kind: Service
metadata:
  name: my-nodeport
spec:
  type: NodePort
  selector:
    app: my-deployment
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080    # Must be 30000-32767
